[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Fast unit tests (no DB, no LLM)
    integration: Tests that hit the database
    llm: Tests that call an LLM (Groq/Ollama)
    e2e: Full end-to-end pipeline tests
    slow: Tests that take > 30 seconds
    rag: RAG-specific tests
    sql: SQL agent tests
    perf: Performance/latency benchmarks
addopts = -v --tb=short
